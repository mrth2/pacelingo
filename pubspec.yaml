name: pacelingo
description: PaceLingo - A Personalized AI English Tutor PWA for family learning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # AI
  google_generative_ai: ^0.4.6

  # Audio
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # State Management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.25.15

flutter:
  uses-material-design: true
  assets:
    - assets/images/
